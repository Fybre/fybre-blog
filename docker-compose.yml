services:
  blog:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
      - ./public/uploads:/app/public/uploads
    environment:
      - JWT_SECRET=${JWT_SECRET:?Set JWT_SECRET to a strong random value in your environment or .env file}
      - NODE_ENV=production
    restart: unless-stopped
